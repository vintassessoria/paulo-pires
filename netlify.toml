# Configuração de deploy (Netlify). No Vercel não é necessário —
# ele detecta o Vite automaticamente (build: npm run build, saída: dist).
[build]
  command = "npm run build"
  publish = "dist"

# Cache longo para os assets versionados (hash no nome do arquivo)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
